<svg width="100%" viewBox="0 0 680 480" xmlns="http://www.w3.org/2000/svg" style="font-family: Arial, sans-serif; background: #f8f9fa;">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- Background network zone -->
<rect x="20" y="20" width="640" height="440" rx="16" fill="#F5F7FA" stroke="#AAAAAA" stroke-width="1" stroke-dasharray="6 4"/>
<text font-size="12" x="340" y="44" text-anchor="middle" fill="#888888" font-family="Arial">Internal Network — 192.168.50.0/24 — VirtualBox (isolated)</text>

<!-- WINDOWS VM container -->
<rect x="44" y="60" width="262" height="350" rx="12" fill="#E6F1FB" stroke="#2E75B6" stroke-width="1.5"/>
<text font-size="14" font-weight="600" x="175" y="90" text-anchor="middle" fill="#1F4E79" font-family="Arial">Windows VM</text>
<text font-size="12" x="175" y="108" text-anchor="middle" fill="#2E75B6" font-family="Arial">192.168.50.2</text>

<!-- Atomic Red Team -->
<rect x="64" y="124" width="222" height="56" rx="8" fill="#FCEBEB" stroke="#A32D2D" stroke-width="1"/>
<text font-size="13" font-weight="600" x="175" y="148" text-anchor="middle" fill="#501313" font-family="Arial">Atomic Red Team</text>
<text font-size="11" x="175" y="167" text-anchor="middle" fill="#791F1F" font-family="Arial">Attack simulation (Invoke-AtomicTest)</text>

<!-- Arrow ART -> Sysmon -->
<line x1="175" y1="180" x2="175" y2="204" stroke="#666" stroke-width="1" marker-end="url(#arrow)"/>
<text font-size="10" x="198" y="196" fill="#888" font-family="Arial">generates telemetry</text>

<!-- Sysmon -->
<rect x="64" y="208" width="222" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="1"/>
<text font-size="13" font-weight="600" x="175" y="232" text-anchor="middle" fill="#26215C" font-family="Arial">Sysmon v15.15</text>
<text font-size="11" x="175" y="251" text-anchor="middle" fill="#3C3489" font-family="Arial">SwiftOnSecurity config</text>

<!-- Arrow Sysmon -> Forwarder -->
<line x1="175" y1="264" x2="175" y2="290" stroke="#666" stroke-width="1" marker-end="url(#arrow)"/>

<!-- Universal Forwarder -->
<rect x="64" y="294" width="222" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1"/>
<text font-size="13" font-weight="600" x="175" y="318" text-anchor="middle" fill="#04342C" font-family="Arial">Universal Forwarder 9.2.1</text>
<text font-size="11" x="175" y="337" text-anchor="middle" fill="#085041" font-family="Arial">inputs.conf configured</text>

<!-- Log sources list -->
<text font-size="10" x="175" y="370" text-anchor="middle" fill="#555" font-family="Arial">Sysmon/Operational  |  WinEventLog:Security</text>
<text font-size="10" x="175" y="385" text-anchor="middle" fill="#555" font-family="Arial">WinEventLog:System  |  linux_secure</text>

<!-- TCP FORWARDING ARROW -->
<path d="M286 322 L394 322" stroke="#0F6E56" stroke-width="2" stroke-dasharray="6 3" marker-end="url(#arrow)" fill="none"/>
<rect x="305" y="305" width="70" height="24" rx="4" fill="#E1F5EE"/>
<text font-size="12" font-weight="600" x="340" y="321" text-anchor="middle" fill="#0F6E56" font-family="Arial">TCP 9997</text>
<text font-size="10" x="340" y="340" text-anchor="middle" fill="#0F6E56" font-family="Arial">log forwarding</text>

<!-- UBUNTU VM container -->
<rect x="374" y="60" width="282" height="350" rx="12" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1.5"/>
<text font-size="14" font-weight="600" x="515" y="90" text-anchor="middle" fill="#04342C" font-family="Arial">Ubuntu VM</text>
<text font-size="12" x="515" y="108" text-anchor="middle" fill="#0F6E56" font-family="Arial">192.168.50.4</text>

<!-- Splunk Enterprise -->
<rect x="394" y="124" width="242" height="70" rx="8" fill="#EAF3DE" stroke="#3B6D11" stroke-width="1"/>
<text font-size="13" font-weight="600" x="515" y="150" text-anchor="middle" fill="#173404" font-family="Arial">Splunk Enterprise 10.2.1</text>
<text font-size="11" x="515" y="169" text-anchor="middle" fill="#27500A" font-family="Arial">Port 8000 (Web UI)</text>
<text font-size="11" x="515" y="184" text-anchor="middle" fill="#27500A" font-family="Arial">Port 9997 (Receiver)</text>

<!-- Arrow Splunk -> SPL -->
<line x1="515" y1="194" x2="515" y2="218" stroke="#666" stroke-width="1" marker-end="url(#arrow)"/>

<!-- SPL Detection Queries -->
<rect x="394" y="222" width="242" height="56" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="1"/>
<text font-size="13" font-weight="600" x="515" y="247" text-anchor="middle" fill="#412402" font-family="Arial">SPL Detection Queries</text>
<text font-size="11" x="515" y="266" text-anchor="middle" fill="#633806" font-family="Arial">4 MITRE ATT&amp;CK detection rules</text>

<!-- Arrow SPL -> Dashboard -->
<line x1="515" y1="278" x2="515" y2="302" stroke="#666" stroke-width="1" marker-end="url(#arrow)"/>

<!-- Dashboard -->
<rect x="394" y="306" width="242" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="1"/>
<text font-size="13" font-weight="600" x="515" y="330" text-anchor="middle" fill="#26215C" font-family="Arial">Detection Dashboard</text>
<text font-size="11" x="515" y="349" text-anchor="middle" fill="#3C3489" font-family="Arial">Timeline chart + 4 technique panels</text>

<!-- Result -->
<rect x="414" y="378" width="202" height="22" rx="4" fill="#E8F5E9"/>
<text font-size="12" font-weight="600" x="515" y="393" text-anchor="middle" fill="#1B5E20" font-family="Arial">4/4 Detected — 100% Detection Rate</text>
</svg>
